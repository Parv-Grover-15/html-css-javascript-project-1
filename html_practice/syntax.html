<!DOCTYPE html>
<html>  
    <head>
        <title> THREE BUTTONS </title>
    </head>  
    
    <body>
        <style>
    .follow-button {
        background-color: #ff0000; /* Green */
        border: none;
        color: white;
        text-align: center;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        height: 50px;
        width: 100px;
        border-radius: 3px;
        margin-right: 20px;
        transition-duration: 0.5s;
    }
    .follow-button:hover {
        opacity: 0.5;
    }

    .like-button {
        background-color: #eeff02; /* Green */
        
        color: rgb(0, 0, 0);
        text-align: center;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        height: 50px;
        width: 100px;
        border-radius: 3px;
        transition-duration: 0.5s;
        margin-right: 20px;
    }

    .like-button:hover {
        opacity: 0.5;
    }

    .join-button {
        background-color: #f200ff; /* Green */
        
        color: white;
        text-align: center;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        height: 50px;
        width: 100px;
        border-radius: 25px;
        transition-duration: 0.5s;
    }
    .join-button:hover {
        opacity: 0.5;
    }

</style>

<button class="follow-button">
    FOLLOW
</button>

<button class="like-button">
     LIKE
</button>

<button class="join-button">
    join
</button> 
    </body>



</html>

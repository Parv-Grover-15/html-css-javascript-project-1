<!DOCTYPE html>
  
<head>
    <title>TRAVEL UX</title>
    <link rel="stylesheet" href="upper_bar.css">
    <link rel="stylesheet" href="main_center.css">
</head>
<body>
    <nav class="upmost_bar">
        <div class="logo">
            <img src="picss/main_logo.png" alt="Logo">
        </div>
        <ul class="upper_bar_options">
            <div class="home">
                <li><a href="#">Home</a></li>
            </div>
            <div class="destination">
                <li><a href="#">Destination</a></li>
            </div>
            <div class="services">
                <li><a href="#">Services</a></li>
            </div>
            <div class="about us">
                <li><a href="#">About Us</a></li>
            </div>
            <div class="contact">
                <li><a href="#">Contact</a></li>
            </div>
        </ul>
        <div class="book">
            <button class="book_now">Book Now</button>
        </div>
    </nav>

    <div class="main_image_div">
        <img src="picss/main.png" alt="Main Image" class="main_img">

        <div class="main_text">
            <div class="explore_one">
                <h1 class="explore_text">EXPLORE THE WORLD WITH US</h1>
            </div>
            <div class="discover_one">
                <h2 class="discover_text">DISCOVER AMAZING PLACES WITH US</h2>
            </div>
            <div class="travelus_one">
                <h3 class="travelus_text">Travelux brings you the best travel experiences around the world.
                                        Discover breathtaking places, unique cultures and unforgettable
                                        adventures.</h3>
            </div>
            <div class="buttons">
                <button class="book_now">Book Now</button>
                <button class="learn_more">Learn More</button>
            </div>
            
        </div>
            
    </div>
</body>
</html>
